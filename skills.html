<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>
<style>
    /* SKILLS SECTION */

.skills-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:30px;
}

/* SKILL CARD */

.skill-card{

    background:rgba(255,255,255,0.08);

    border:1px solid rgba(255,255,255,0.1);

    backdrop-filter:blur(15px);

    border-radius:25px;

    padding:40px 20px;

    text-align:center;

    transition:0.4s;

    position:relative;

    overflow:hidden;
}

/* GLOW EFFECT */

.skill-card::before{

    content:'';

    position:absolute;

    width:120px;
    height:120px;

    background:rgba(255,78,205,0.2);

    border-radius:50%;

    top:-40px;
    right:-40px;

    filter:blur(35px);
}

/* HOVER */

.skill-card:hover{

    transform:
    translateY(-10px)
    scale(1.03);

    border:1px solid #ff4ecd;

    box-shadow:
    0 0 25px rgba(255,78,205,0.3);
}

/* ICON */

.skill-card i{

    font-size:70px;

    margin-bottom:20px;

    transition:0.4s;
}

.skill-card:hover i{

    transform:scale(1.15);
}

/* TEXT */

.skill-card h2{

    font-size:24px;

    font-weight:600;

    color:white;
}
    </style>
    <link rel="stylesheet" href="css/style.css">
     <link rel="stylesheet" href="css/nav.css">


    <!-- BOXICONS -->

    href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

</head>
